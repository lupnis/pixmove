name: Feature Request
description: Propose an improvement or a new feature
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        For larger changes, please explain the problem first, not only the solution you want.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: The current workflow is missing ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What would you like to happen?
      placeholder: Add ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives did you consider?
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add screenshots, references, or related links if useful.
