name: Bug Report
description: Report a reproducible bug or regression
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide a minimal, reproducible description.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the bug?
      placeholder: A short description of the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List the exact steps needed to trigger the issue.
      placeholder: |
        1. Open ...
        2. Upload ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 135 / Edge 135 / Safari 18 ...
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / macOS 15 / Ubuntu 24.04 ...
  - type: textarea
    id: logs
    attributes:
      label: Console Errors or Logs
      description: Paste relevant browser console output if available.
      render: shell
